global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    monitor: 'v-social-media-api-monitor'

scrape_configs:
  # Social Media API metrics
  - job_name: 'v-social-media-api'
    static_configs:
      - targets: ['host.docker.internal:3000'] # Use host.docker.internal to access host machine
    metrics_path: '/api/metrics'
    scrape_interval: 5s

  # Prometheus self-monitoring
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # Node exporter for system metrics
  - job_name: 'node-exporter'
    static_configs:
      - targets: ['node-exporter:9100']

  # Optional: PostgreSQL exporter (if you add it later)
  - job_name: 'postgresql'
    static_configs:
      - targets: ['host.docker.internal:9187']

# Alerting rules (optional)
alerting:
  alertmanagers:
    - static_configs:
        - targets: []

# Rules for alerts and recording rules
rule_files:
  # - '/etc/prometheus/rules/*.yml'
