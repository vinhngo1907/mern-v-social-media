global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    monitor: 'social-media-monitor'

scrape_configs:
  # =========================
  # Social Media API
  # =========================
  - job_name: 'social-media-api'
    static_configs:
      - targets:
          - 'host.docker.internal:3000'
    metrics_path: '/metrics'
    scrape_interval: 5s

  # =========================
  # Auth service (optional)
  # =========================
  - job_name: 'social-media-auth'
    static_configs:
      - targets:
          - 'host.docker.internal:3001'
    metrics_path: '/metrics'
    scrape_interval: 5s

  # =========================
  # Media service (upload / video)
  # =========================
  - job_name: 'social-media-media'
    static_configs:
      - targets:
          - 'host.docker.internal:3002'
    metrics_path: '/metrics'
    scrape_interval: 10s

  # =========================
  # Prometheus self-monitoring
  # =========================
  - job_name: 'prometheus'
    static_configs:
      - targets:
          - 'localhost:9090'

  # =========================
  # Node exporter (system metrics)
  # =========================
  - job_name: 'node-exporter'
    static_configs:
      - targets:
          - 'node-exporter:9100'

  # =========================
  # MongoDB exporter
  # =========================
  - job_name: 'mongodb'
    static_configs:
      - targets:
          - 'host.docker.internal:9187'

alerting:
  alertmanagers:
    - static_configs:
        - targets: []

rule_files:
  # - '/etc/prometheus/rules/*.yml'
